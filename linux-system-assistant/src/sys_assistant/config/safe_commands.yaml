# Safe command whitelist for Linux System Assistant
# UI must call action keys only. Never pass raw commands from UI.

check_disk:
  command: ["df", "-h"]
  sudo: false
  timeout_sec: 10
  description: "Kiểm tra dung lượng ổ đĩa"
  category: "read"
  confirm: false

check_failed_services:
  command: ["systemctl", "--failed"]
  sudo: false
  timeout_sec: 10
  description: "Kiểm tra service bị lỗi"
  category: "read"
  confirm: false

check_critical_logs:
  command: ["journalctl", "-p", "3", "-xb", "--no-pager"]
  sudo: false
  timeout_sec: 15
  description: "Xem log lỗi nghiêm trọng trong phiên boot hiện tại"
  category: "read"
  confirm: false

check_hardware_gpu:
  command: ["lspci"]
  sudo: false
  timeout_sec: 10
  description: "Xem thông tin phần cứng PCI, dùng để lọc VGA/3D/Display"
  category: "read"
  confirm: false

check_block_devices:
  command: ["lsblk"]
  sudo: false
  timeout_sec: 10
  description: "Xem ổ đĩa và phân vùng"
  category: "read"
  confirm: false

check_sensors:
  command: ["sensors"]
  sudo: false
  timeout_sec: 10
  description: "Xem sensor nhiệt độ/quạt nếu lm-sensors có hỗ trợ"
  category: "read"
  confirm: false

process_snapshot:
  command: ["ps", "-eo", "pid=,uid=,user=,pcpu=,pmem=,rss=,comm=", "--sort=-pcpu"]
  sudo: false
  timeout_sec: 5
  description: "Lấy snapshot CPU/RAM/icon owner từng tiến trình bằng ps"
  category: "read"
  confirm: false

power_saver:
  command: ["powerprofilesctl", "set", "power-saver"]
  sudo: false
  timeout_sec: 10
  description: "Chuyển sang chế độ tiết kiệm pin"
  category: "performance"
  confirm: false

balanced:
  command: ["powerprofilesctl", "set", "balanced"]
  sudo: false
  timeout_sec: 10
  description: "Chuyển sang chế độ cân bằng"
  category: "performance"
  confirm: false

performance:
  command: ["powerprofilesctl", "set", "performance"]
  sudo: false
  timeout_sec: 10
  description: "Chuyển sang chế độ hiệu năng cao"
  category: "performance"
  confirm: false

power_profile_get:
  command: ["powerprofilesctl", "get"]
  sudo: false
  timeout_sec: 5
  description: "Lấy chế độ điện năng hiện tại"
  category: "read"
  confirm: false

power_profile_list:
  command: ["powerprofilesctl", "list"]
  sudo: false
  timeout_sec: 5
  description: "Lấy danh sách chế độ điện năng hỗ trợ"
  category: "read"
  confirm: false

nvidia_smi:
  command: ["nvidia-smi", "--query-gpu=utilization.gpu,temperature.gpu,name", "--format=csv,noheader,nounits"]
  sudo: false
  timeout_sec: 5
  description: "Đọc thông số GPU NVIDIA"
  category: "read"
  confirm: false

# System tools: additional read-only commands
check_disk_hT:
  command: ["df", "-hT"]
  sudo: false
  timeout_sec: 3
  description: "Kiểm tra dung lượng ổ đĩa chi tiết"
  category: "read"
  confirm: false

check_block_devices_detail:
  command: ["lsblk", "-o", "NAME,SIZE,TYPE,FSTYPE,MOUNTPOINTS,MODEL"]
  sudo: false
  timeout_sec: 3
  description: "Xem thiết bị lưu trữ chi tiết"
  category: "read"
  confirm: false

check_memory:
  command: ["free", "-h"]
  sudo: false
  timeout_sec: 3
  description: "Kiểm tra RAM và Swap"
  category: "read"
  confirm: false

check_uptime:
  command: ["uptime"]
  sudo: false
  timeout_sec: 3
  description: "Xem uptime và tải hệ thống"
  category: "read"
  confirm: false

check_failed_services_nopager:
  command: ["systemctl", "--failed", "--no-pager"]
  sudo: false
  timeout_sec: 5
  description: "Kiểm tra service lỗi (no pager)"
  category: "read"
  confirm: false

check_critical_logs_limited:
  command: ["journalctl", "-p", "3", "-xb", "--no-pager", "-n", "80"]
  sudo: false
  timeout_sec: 8
  description: "Xem log nghiêm trọng (giới hạn 80 dòng)"
  category: "read"
  confirm: false

check_pci_nnk:
  command: ["lspci", "-nnk"]
  sudo: false
  timeout_sec: 5
  description: "Xem PCI devices chi tiết"
  category: "read"
  confirm: false

check_network_ip:
  command: ["ip", "-brief", "addr"]
  sudo: false
  timeout_sec: 3
  description: "Xem địa chỉ IP"
  category: "read"
  confirm: false

check_network_route:
  command: ["ip", "route"]
  sudo: false
  timeout_sec: 3
  description: "Xem routing table"
  category: "read"
  confirm: false

nvidia_smi_detailed:
  command: ["nvidia-smi", "--query-gpu=name,driver_version,utilization.gpu,temperature.gpu,memory.used,memory.total", "--format=csv,noheader,nounits"]
  sudo: false
  timeout_sec: 5
  description: "Đọc thông số GPU NVIDIA chi tiết"
  category: "read"
  confirm: false
